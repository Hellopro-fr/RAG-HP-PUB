# graphify services policy — RAG-HP-PUB
#
# Single source of truth for which services under apps-microservices/ belong
# in the unified knowledge graph. Every service directory must appear in
# exactly one of the two lists below.
#
# The coverage-check CI workflow reads this file on every PR and fails if a
# new service directory is missing from both lists. That is how a dev who
# forgets to classify a new service gets caught before merge.
#
# Schema:
#   graphed:
#     - path: apps-microservices/<name>
#       added_at: YYYY-MM-DD          # ISO date the service entered the graph
#       notes: "optional short note"
#
#   not_graphed:
#     - path: apps-microservices/<name>
#       reason: <reason-code>         # see "Reason codes" below
#       details: "optional longer note explaining why, if reason is ambiguous"
#
# Reason codes (for not_graphed):
#   too_small           — < 10 files and no rich CLAUDE.md; raw grep is enough
#   frontend            — Next.js / React frontend, separate toolchain
#   debug_variant       — debug or test variant of another service
#   deprecated          — superseded, archived, or slated for removal
#   template_scaffold   — template used to scaffold new services, not a service itself
#   templated_wrapper   — FastAPI / processor wrapper following a common pattern; graph one reference service and skip siblings
#   candidate_deferred  — could be worth graphing eventually; not prioritised yet. Promote to `graphed` when cross-service queries start surfacing it.
#
# When to move a service from not_graphed to graphed:
#   1. You hit a question graphify cannot answer because the service's concepts and its
#      backbone cross-links are missing from the unified graph.
#   2. Someone is onboarding to the service and would benefit from a pre-built map.
#
# Procedure for adding a service to the graph is in
# docs/graphify-guide-en.md § "Extending — add a service to the unified graph".
# Do not edit this file by hand without following that checklist — the guide
# lists, this policy, the CI workflow path filter, and graph.json must stay
# consistent.

graphed:
  - path: apps-microservices/crawler-service
    added_at: 2026-04-24
    notes: "Node.js + Python, complex state machine, recent bug-fix cluster around OOM relaunch / leader election / archive staging."
  - path: apps-microservices/graph-rag-api-recherche-rust-service
    added_at: 2026-04-24
    notes: "Rust (Actix-web / tonic). Core retrieval. Unique stack; cross-links to libs/rust-common-utils grpc clients and to Python LLM providers."
  - path: apps-microservices/api-detection-langue-fr
    added_at: 2026-05-05
    notes: "FastAPI server backing crawler's detection-langue-fr client. Promoted from templated_wrapper because the caller-contract / admission-control / inflight-dedup work made cross-service questions (crawler -> backend) routine."

