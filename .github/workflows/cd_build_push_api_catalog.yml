name: 'Build and Push api-catalog-service'

on:
  push:
    branches: [main]
    paths:
      - 'apps-microservices/api-catalog-service/**'
      - 'protos/grpc_stubs/api_catalog.proto'
  # workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  actions: read

env:
  PROJECT_ID: 'hellopro-rag-project'
  REGION: 'europe-west1'
  SERVICE: 'api-catalog-service'
  SERVICE_NAME: 'api-catalog-service'

jobs:
  build_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CI artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-catalog-ci-artifacts
          path: ./dist

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_DEV }}'

      - name: Set Google Cloud Project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID_DEV }}

      - name: Authenticate to Google Cloud Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build \
            -f apps-microservices/${{ env.SERVICE_NAME }}/Dockerfile \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE }}:latest" \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE }}:${{ github.sha }}" \
            .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE }}:latest"
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE }}:${{ github.sha }}"
