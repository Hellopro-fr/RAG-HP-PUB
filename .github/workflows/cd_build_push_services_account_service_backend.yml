
name: 'Build and Deploy account-service-backend'

on:
  push:
    branches:
      - main
    paths:
      - 'apps-microservices/account-service-backend/**'
      - 'libs/common-utils/**'
      - '.github/workflows/cd_build_push_services_account_service_backend.yml'
  workflow_call:

permissions:
  contents: read
  actions: read

env:
  PROJECT_ID: 'hellopro-rag-project' # TODO: a ajouter dans les variables d'environnement du repo
  REGION: 'europe-west1' # TODO: a ajouter dans les variables d'environnement du repo
  SERVICE: 'account-service-backend-dev' # TODO: a ajuster selon le services
  VARIABLES: ${{ secrets.PROD_ENV }}
  SERVICE_NAME: 'account-service-backend' # TODO: a ajuster selon le service

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_DEV }}'

      - name: Set Google Cloud Project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID_DEV }}

      - name: Authenticate to Google Cloud
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: 'Build and Push Container'
        # Build context = repo root (so the Dockerfile can COPY libs/common-utils),
        # dockerfile = apps-microservices/account-service-backend/Dockerfile.
        run: |-
          docker build \
            -f apps-microservices/${{ env.SERVICE_NAME }}/Dockerfile \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE_NAME }}:${{ github.sha }}" \
            -t "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE_NAME }}:latest" \
            .
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE_NAME }}:latest"

      - name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17' # google-github-actions/deploy-cloudrun@v2
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          flags: '--ingress internal-and-cloud-load-balancing --allow-unauthenticated --vpc-connector=vpc-access-connector --memory 2Gi --cpu 2'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/hellopro/${{ env.SERVICE_NAME }}:${{ github.sha }}'

      - name: 'Show output'
        run: |2-

          echo ${{ steps.deploy.outputs.url }}
