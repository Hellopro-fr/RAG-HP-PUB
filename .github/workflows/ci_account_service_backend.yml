name: CI / account-service-backend

on:
  pull_request:
    paths:
      - 'apps-microservices/account-service-backend/**'
      - '.github/workflows/ci_account_service_backend.yml'
  push:
    branches: [main, features/account-service]
    paths:
      - 'apps-microservices/account-service-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps-microservices/account-service-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: apps-microservices/account-service-backend/go.sum
      - run: go vet ./...
      - run: go test -buildvcs=false ./...
      - run: go test -tags=integration -buildvcs=false ./...
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: apps-microservices/account-service-backend
