name: CI SERVICE API CATALOG

on:
  pull_request:
    paths:
      - 'apps-microservices/api-catalog-service/**'
      - 'protos/grpc_stubs/api_catalog.proto'
  push:
    branches: [main, features/poc]
    paths:
      - 'apps-microservices/api-catalog-service/**'
  workflow_call:

env:
  SERVICE_NAME: 'api-catalog-service'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps-microservices/${{ env.SERVICE_NAME }}

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps-microservices/${{ env.SERVICE_NAME }}/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1

      - name: go build
        run: go build ./...

      - name: Package artifact
        run: mkdir -p dist && echo "ok" > dist/ci-ok.txt

      - uses: actions/upload-artifact@v4
        with:
          name: api-catalog-ci-artifacts
          path: apps-microservices/${{ env.SERVICE_NAME }}/dist/
