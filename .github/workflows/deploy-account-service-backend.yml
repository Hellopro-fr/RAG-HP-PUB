name: 'Deploy — account-service-backend'

# Wrapper minimal qui appelle deploy-cloud-run.yml avec les inputs spécifiques
# au service account-service-backend (Go backend, port 8600, ingress=internal).
#
# Ticket : 001-INFRA-GCP-ARCHI — Sprint 002 Phase C.4 (POC #1)
# Mapping secrets : 7 secrets account-service-backend-* (créés Phase C.2)
# Pré-requis : workflow réutilisable deploy-cloud-run.yml + secrets alimentés.

on:
  push:
    branches:
      # Phase POC (Sprint 002) : uniquement les branches migration déclenchent un deploy auto.
      # main + features/poc à réactiver en S006 (CI/CD consolidation + branch protection).
      - 'feat/migration-**'
      # - main                       # TODO S006 : réactiver pour CD prod
      # - features/poc               # TODO S006 : réactiver après validation POC
      # - features/infra-gcp-prod    # TODO : réactiver si push de la branche infra centralisée
    paths:
      - 'apps-microservices/account-service-backend/**'
      - '.github/workflows/deploy-account-service-backend.yml'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      cloud_run_region:
        description: 'Région Cloud Run (override)'
        required: false
        type: string
        default: 'europe-west1'

# Permissions requises par le workflow réutilisable deploy-cloud-run.yml
# (sinon GHA refuse l'appel : "is requesting 'id-token: write', but is only allowed 'id-token: none'")
permissions:
  id-token: write   # Pour WIF OIDC vers GCP
  contents: read    # Pour checkout du code

jobs:
  deploy:
    name: 'Deploy account-service-backend'
    uses: ./.github/workflows/deploy-cloud-run.yml
    with:
      service_name: account-service-backend
      dockerfile_path: apps-microservices/account-service-backend/Dockerfile
      build_context: apps-microservices/account-service-backend
      cloud_run_region: ${{ github.event.inputs.cloud_run_region || 'europe-west1' }}
      # ingress=all + allow_unauthenticated=true depuis 2026-06-12 (F-HP-NGINX-001).
      # Rationale : permet au frontend Nginx (CR public) de faire proxy_pass HTTPS vers
      # ce backend. L'authentification est gérée par le JWT applicatif (JWT_SECRET partagé
      # avec api-gateway prod, validation côté code Go). Trade-off accepté pour le POC ;
      # à durcir en S004 via Cloud Load Balancer + Cloud Armor devant les 2 services.
      ingress: all
      allow_unauthenticated: true
      cpu: '1'
      memory: '512Mi'
      min_instances: 0
      max_instances: 10
      container_port: 8600
      vpc_connector: vpc-access-connector
      vpc_egress: private-ranges-only
      health_check_path: /health
      # Env vars non-sensibles (valeurs validées depuis VM GPU prod conteneur account-service-backend - 2026-06-09)
      # MYSQL_HOST/API_CATALOG_GRPC : IP interne VM GPU 10.11.0.2. À remplacer par DNS interne (D3 - Phase ultérieure).
      # API_CATALOG_GRPC port 19100 (et non 9100) : le port 9100 host VM est occupé par node_exporter Prometheus.
      # Le conteneur api-catalog-service expose 9100/9101 en interne Docker mais bind 10.11.0.2:19100->9100
      # côté host pour permettre l'appel gRPC depuis Cloud Run via VPC Connector. Firewall GCP dédié :
      # allow-cr-eu-to-vm-gpu-api-catalog (source=10.0.2.0/28, target_sa=vm-gpu-runtime, tcp:19100,19101).
      # Réf : T001-S003-000 / F-HP-NGINX-001 résolution gRPC frame error 2026-06-15.
      # JWT_AUDIENCE : URL complète https://www.hellopro.fr (validation JWT cross-service, partagé avec api-gateway).
      # SLACK_ENV_LABEL : dev-cr-poc pour identifier explicitement le POC dans les notifs Slack (vs prod sur VM GPU).
      env_vars_json: |
        {
          "ACCOUNT_PORT": "8600",
          "ACCOUNT_PUBLIC_URL": "https://login.hellopro.eu",
          "MYSQL_HOST": "10.11.0.2",
          "MYSQL_PORT": "3307",
          "MYSQL_USER": "gateway_user",
          "MYSQL_DB": "gateway_db",
          "JWT_ALGO": "HS256",
          "JWT_AUDIENCE": "https://www.hellopro.fr",
          "AUTH_URL": "https://www.hellopro.fr/partenaires_externes/info_produit/auth/auth.php",
          "ADMIN_EMAILS": "sandrianirinaharivelo@hellopro.fr,randrianjanaka@hellopro.fr,rravelonarisoa@hellopro.fr",
          "FALLBACK_USER": "aandrianirina",
          "FALLBACK_EMAIL": "aandrianirina@hellopro.fr",
          "OAUTH2_DEFAULT_TOKEN_TTL": "60",
          "OAUTH2_DEFAULT_REFRESH_TTL": "2592000",
          "OAUTH2_AUTH_CODE_TTL": "600",
          "LOGOUT_WEBHOOK_TIMEOUT": "5",
          "LOGOUT_WEBHOOK_RETRIES": "3",
          "SECURE_COOKIE": "true",
          "SLACK_ENV_LABEL": "dev-cr-poc",
          "API_CATALOG_GRPC": "10.11.0.2:19100"
        }
      # Secrets montés depuis Secret Manager (cf. Phase C.2 - 7 secrets dédiés)
      secret_env_vars_json: |
        {
          "MYSQL_PASS": "account-service-backend-mysql-pass:latest",
          "ENCRYPTION_KEY": "account-service-backend-encryption-key:latest",
          "JWT_SECRET": "account-service-backend-jwt-secret:latest",
          "FALLBACK_PASS": "account-service-backend-fallback-pass:latest",
          "INTERNAL_ADMIN_TOKEN": "account-service-backend-internal-admin-token:latest",
          "CATALOG_ADMIN_KEY": "account-service-backend-catalog-admin-key:latest",
          "SLACK_WEBHOOK_URL": "account-service-backend-slack-webhook-url:latest"
        }
    secrets:
      # Slack webhook pour notif post-deploy (anticipation F-HP-ARCH-001 - platform-migration-slack-webhook-url)
      # À configurer en repo secret SLACK_WEBHOOK_URL (skip si absent).
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
