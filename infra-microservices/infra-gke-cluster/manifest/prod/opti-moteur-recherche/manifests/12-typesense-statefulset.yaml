apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: typesense
  namespace: moteur-recherche
  labels:
    app.kubernetes.io/name: typesense
    app.kubernetes.io/managed-by: manifest
    environment: prod
    owner: devsecops
    cost-center: ia-rag
    app: opti-moteur-recherche
spec:
  serviceName: typesense
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: typesense
      app: opti-moteur-recherche
  template:
    metadata:
      labels:
        app.kubernetes.io/name: typesense
        app: opti-moteur-recherche
        environment: prod
    spec:
      serviceAccountName: opti-moteur-sa
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 2000   # accessibilite /data pour groupe non-root (test post-apply au S2 §6.3)
      containers:
        - name: typesense
          image: typesense/typesense:27.1
          imagePullPolicy: IfNotPresent
          args:
            - "--data-dir=/data"
            - "--api-key=$(TYPESENSE_API_KEY)"
            - "--listen-port=8108"
            # NB : pas de --enable-cors en prod (cf. DT006). CORS gere par opti-moteur-front (S3).
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: typesense-api-key
                  key: api-key
          ports:
            - containerPort: 8108
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: "12Gi"   # 2026-05-13 : augmente de 8Gi -> 12Gi suite OOMKill incident #007
            limits:
              cpu: "4"
              memory: "32Gi"   # 2026-05-13 : augmente de 16Gi -> 32Gi (1,5M docs OOM a 16Gi, large marge pour 3M target)
          volumeMounts:
            - name: typesense-data
              mountPath: /data
          # startupProbe : separe le bootstrap (long avec 130k+ docs) des liveness/readiness.
          # Budget de boot : 60 * 10s = 10 min max. Augmenter failureThreshold si index grossit.
          # Resout l'incident #006 (2026-05-13) : liveness tuait le pod avant fin chargement docs.
          startupProbe:
            httpGet:
              path: /health
              port: 8108
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8108
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8108
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: typesense-data
        labels:
          app.kubernetes.io/name: typesense
          app.kubernetes.io/managed-by: manifest
          environment: prod
          owner: devsecops
          cost-center: ia-rag
          app: opti-moteur-recherche
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 100Gi
