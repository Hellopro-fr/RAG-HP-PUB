# =============================================================================
# ⚠️  TEMPLATE DOCUMENTAIRE — NE PAS APPLIQUER VIA `kubectl apply -f`
# =============================================================================
#
# Ce fichier sert UNIQUEMENT de référence sur la structure attendue du Secret.
# Les valeurs (user + password Milvus) NE DOIVENT JAMAIS être committées en clair.
#
# Pour créer le Secret en prod, utiliser le one-liner du sprint_003 §7.1 :
#
#   read -p "Username Milvus prod : " ZILLIZ_USER
#   read -s -p "Password Milvus prod : " ZILLIZ_PASSWORD; echo ""
#   kubectl create secret generic opti-moteur-milvus-creds \
#     --namespace=moteur-recherche \
#     --from-literal=zilliz-user="$ZILLIZ_USER" \
#     --from-literal=zilliz-password="$ZILLIZ_PASSWORD" \
#     --dry-run=client -o yaml | kubectl apply -f -
#   unset ZILLIZ_USER ZILLIZ_PASSWORD
#
# Puis ajouter les labels :
#
#   kubectl label secret opti-moteur-milvus-creds -n moteur-recherche \
#     app.kubernetes.io/name=opti-moteur-front \
#     app.kubernetes.io/managed-by=manifest \
#     environment=prod \
#     owner=devsecops \
#     cost-center=ia-rag \
#     app=opti-moteur-recherche
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: opti-moteur-milvus-creds
  namespace: moteur-recherche
  labels:
    app.kubernetes.io/name: opti-moteur-front
    app.kubernetes.io/managed-by: manifest
    environment: prod
    owner: devsecops
    cost-center: ia-rag
    app: opti-moteur-recherche
type: Opaque
stringData:
  zilliz-user: "<MILVUS_USER>"          # NE PAS REMPLACER ICI — utiliser la commande ci-dessus
  zilliz-password: "<MILVUS_PASSWORD>"  # NE PAS REMPLACER ICI — utiliser la commande ci-dessus
