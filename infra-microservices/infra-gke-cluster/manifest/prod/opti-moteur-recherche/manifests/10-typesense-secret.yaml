# =============================================================================
# ⚠️  TEMPLATE DOCUMENTAIRE — NE PAS APPLIQUER VIA `kubectl apply -f`
# =============================================================================
#
# Ce fichier sert UNIQUEMENT de référence sur la structure attendue du Secret.
# La valeur de l'API key NE DOIT JAMAIS être committée en clair dans Git.
#
# Pour créer le Secret en prod, utiliser le one-liner du sprint_002 §6.1 :
#
#   TYPESENSE_API_KEY=$(openssl rand -base64 32) && \
#   kubectl create secret generic typesense-api-key \
#     --namespace=moteur-recherche \
#     --from-literal=api-key="$TYPESENSE_API_KEY" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Puis ajouter les labels :
#
#   kubectl label secret typesense-api-key -n moteur-recherche \
#     app.kubernetes.io/name=typesense \
#     app.kubernetes.io/managed-by=manifest \
#     environment=prod \
#     owner=devsecops \
#     cost-center=ia-rag \
#     app=opti-moteur-recherche
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: typesense-api-key
  namespace: moteur-recherche
  labels:
    app.kubernetes.io/name: typesense
    app.kubernetes.io/managed-by: manifest
    environment: prod
    owner: devsecops
    cost-center: ia-rag
    app: opti-moteur-recherche
type: Opaque
stringData:
  api-key: "<GENERATED_VIA_OPENSSL_RAND_BASE64_32>"   # NE PAS REMPLACER ICI — utiliser la commande ci-dessus
