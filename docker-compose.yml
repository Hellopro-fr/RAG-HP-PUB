    profiles: ["qc"]
    restart: unless-stopped
    ports:
      - "8590:8590"
    environment:
      - TRACKING_BASE_PATH=/app/tracking
    volumes:
      # Monte tous les dossiers tracking des services QC (paths VM)
      - /mnt/data/docker/images/generation-question-caracteristiques/qc-generation-question1:/app/tracking/question1:ro
      - /mnt/data/docker/images/generation-question-caracteristiques/qc-generation-question2aN:/app/tracking/question2aN:ro
