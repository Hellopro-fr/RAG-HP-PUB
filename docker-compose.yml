      - "8586:8586"
    environment:
      - RINGOVER_API_KEY=${RINGOVER_API_KEY}
      - RINGOVER_API_BASE_URL=${RINGOVER_API_BASE_URL:-https://public-api.ringover.com/v2}
      - MCP_PORT=8586
    networks:
      - services-net
    logging: *logging_defaults

  # ── MCP Leexi Service ──────────────────────────────────────────────────
  mcp-leexi-service:
    build:
      context: .
      dockerfile: ./apps-microservices/mcp-leexi-service/Dockerfile
    container_name: mcp-leexi-service
    profiles: ["mcp"]
    restart: unless-stopped
    ports:
      - "8589:8589"
    environment:
      - LEEXI_API_KEY_ID=${LEEXI_API_KEY_ID}
      - LEEXI_API_KEY_SECRET=${LEEXI_API_KEY_SECRET}
      - LEEXI_API_BASE_URL=${LEEXI_API_BASE_URL:-https://public-api.leexi.ai/v1}
      - MCP_PORT=8589
      # Shared secret enabling /admin/users + /admin/teams (consumed by mcp-gateway-service)
      - MCP_LEEXI_ADMIN_TOKEN=${MCP_LEEXI_ADMIN_TOKEN}
    networks:
      - services-net
    logging: *logging_defaults

  # ── MCP Classification Produit Service ──────────────────────────────────
  mcp-classification-produit-service:
    build:
      context: .
      dockerfile: ./apps-microservices/mcp-classification-produit-service/Dockerfile
    container_name: mcp-classification-produit-service
    profiles: ["mcp"]
    restart: unless-stopped
    ports:
      - "8590:8590"
    environment:
      - MCP_PORT=8590
      - MCP_SERVICE_NAME=mcp-classification-produit
      - MCP_SERVICE_VERSION=0.1.0
      - CLASSIFICATION_API_URL=http://api-classification-lb:80
    networks:
      - services-net
    logging: *logging_defaults

  # ── MCP Neo4j Service ─────────────────────────────────────────────────
  mcp-neo4j-service:
    build:
      context: .
      dockerfile: ./apps-microservices/mcp-neo4j-service/Dockerfile
    container_name: mcp-neo4j-service
    profiles: ["mcp"]
    restart: unless-stopped
    ports:
      - "8587:8587"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
    networks:
      - services-net
    logging: *logging_defaults

  # ── MCP Gateway Service ──────────────────────────────────────────────
  mcp-gateway-service:
    build:
      context: .
      dockerfile: ./apps-microservices/mcp-gateway-service/Dockerfile
    container_name: mcp-gateway-service
    profiles: ["mcp"]
    restart: unless-stopped
    expose:
      - "8592"
    environment:
      - MCP_GATEWAY_PORT=8592
      - MCP_GATEWAY_NAME=${MCP_GATEWAY_NAME:-hellopro-mcp-gateway}
      - MYSQL_DSN=${GATEWAY_MYSQL_USER:-gateway_user}:${GATEWAY_MYSQL_PASS:-gateway_pass}@tcp(mysql:${GATEWAY_MYSQL_PORT:-3306})/${GATEWAY_MYSQL_DB:-gateway_db}?parseTime=true&multiStatements=true
      - ENCRYPTION_KEY=${MCP_ENCRYPTION_KEY}
      - HEALTH_CHECK_INTERVAL=${MCP_HEALTH_CHECK_INTERVAL:-30}
      - AUTH_ENABLED=${MCP_AUTH_ENABLED}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGO=${JWT_ALGO}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - AUTH_URL=${AUTH_URL}
      - SCOPE_TOKEN_REQUIRED=${MCP_SCOPE_TOKEN_REQUIRED}
      - GATEWAY_PUBLIC_URL=${GATEWAY_PUBLIC_URL}
      - ALLOW_INTERNAL_URLS=${MCP_ALLOW_INTERNAL_URLS:-true}
      - ADMIN_EMAILS=${MCP_ADMIN_EMAILS}
      - FALLBACK_USER=${MCP_FALLBACK_USER}
      - FALLBACK_PASS=${MCP_FALLBACK_PASS}
      - FALLBACK_EMAIL=${MCP_FALLBACK_EMAIL}
      # Leexi admin proxy (users/teams listing + ownership filter on tokens)
      - LEEXI_INTERNAL_URL=${LEEXI_INTERNAL_URL}
      - LEEXI_ADMIN_TOKEN=${MCP_LEEXI_ADMIN_TOKEN}
      - ALLOWED_EMAILS=${MCP_ALLOWED_EMAILS}
      # Google Sheets import (OAuth2)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - /mnt/data/docker/images/mcp_server:/data/uploads
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    networks:
      - services-net
    logging: *logging_defaults

  # ── MCP Gateway Frontend ────────────────────────────────────────────
  mcp-gateway-frontend:
    build:
      context: ./apps-microservices/mcp-gateway-frontend
    container_name: mcp-gateway-frontend
    profiles: ["mcp"]
    restart: unless-stopped
    ports:
      - "${MCP_GATEWAY_PORT:-8581}:8581"
    networks:
      - services-net
    logging: *logging_defaults

networks:
  services-net:
    driver: bridge
  services-ext-net:
    name: rag-hp-pub_services-net
    external: true
  services-global-net:
    driver: bridge
    name: global-services-net
    external: true
volumes:
  elasticsearch-data:
    driver: local
  es-snapshots:
    driver: local
  grafana-storage:
  crawler_data:
  image_download_data:
  prometheus_data:
  gr_neo4j_data:
  gr_neo4j_logs:
  gateway_mysql_data: