    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8600/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *logging_defaults

  mysql:
    image: mysql:8.0
    container_name: mysql
    profiles: ["app", "mcp"]
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${GATEWAY_MYSQL_ROOT_PASSWORD:-gateway_root_pass}
      - MYSQL_DATABASE=${GATEWAY_MYSQL_DB:-gateway_db}
      - MYSQL_USER=${GATEWAY_MYSQL_USER:-gateway_user}
      - MYSQL_PASSWORD=${GATEWAY_MYSQL_PASS:-gateway_pass}
      - MYSQL_TCP_PORT=${GATEWAY_MYSQL_PORT:-3306}
    ports:
      - "${GATEWAY_MYSQL_PORT:-3306}:${GATEWAY_MYSQL_PORT:-3306}"
    volumes:
      - gateway_mysql_data:/var/lib/mysql
      - ./apps-microservices/mcp-gateway-service/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${GATEWAY_MYSQL_ROOT_PASSWORD:-gateway_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *logging_defaults

  api-gateway-service:
    build:
      context: .
      dockerfile: ./apps-microservices/api-gateway/Dockerfile
    container_name: api-gateway-service
    profiles: ["app"] # Profile for the main application stack
    volumes:
      - ./apps-microservices/api-gateway/.env.url:/app/.env.url:rw
    restart: unless-stopped
    ports:
      - "8500:8500"
    env_file:
      - .env
    environment:
      # ── Gateway MySQL (token store) ──────────────────────────────────────
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${GATEWAY_MYSQL_PORT:-3306}
      - MYSQL_USER=${GATEWAY_MYSQL_USER:-gateway_user}
      - MYSQL_PASS=${GATEWAY_MYSQL_PASS:-gateway_pass}
      - MYSQL_DB=${GATEWAY_MYSQL_DB:-gateway_db}
      # ── Token security ───────────────────────────────────────────────────
      - GATEWAY_ADMIN_KEY=${GATEWAY_ADMIN_KEY:-changeme-admin-key}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      # ── Docs admin auto-fill (comma-separated emails) ────────────────────
      # Users whose session email matches one of these will get X-Admin-Key
      # pre-filled in Swagger UI automatically.
      - GATEWAY_DOCS_ADMIN_EMAILS=${GATEWAY_DOCS_ADMIN_EMAILS:-}
      - REDIS_URL=redis://:${REDIS_SECRET}@${REDIS_HOST}:${REDIS_PORT}
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    networks:
      - services-net
    logging: *logging_defaults

