version: '3.8'

services:
  model-builder:
    build:
      context: .
      dockerfile: ./model-optimizer/Dockerfile
    profiles: ["tools"] # Profile for one-off build/tooling tasks
    volumes:
      # Monte le répertoire local pour que les modèles ONNX y soient écrits
      - ./triton-model-repo:/output
    # Exécute les deux scripts l'un après l'autre. Le conteneur s'arrêtera après.
    command: /bin/bash -c "python export_embedding_to_onnx.py && python export_reranker_to_onnx.py"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  vllm-server:
    image: vllm/vllm-openai:latest
    profiles: ["app"] # Profile for the main application stack
    command: >
      --model ${MODEL_NAME}
      --tensor-parallel-size 2
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --max-num-seqs 32
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --swap-space 16
      --max-model-len 32768
      --dtype bfloat16
      --load-format safetensors
      --enable-prefix-caching
      --rope-scaling '{"type":"dynamic","factor":2.0}'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for the model to load
      start_period: 30s
    shm_size: '16g'
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    volumes:
      - /mnt/data/docker/images/huggingface_cache:/root/.cache/huggingface
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  triton-server:
    image: nvcr.io/nvidia/tritonserver:24.01-py3 # Utilisez une image récente
    profiles: ["app"] # Profile for the main application stack
    command: tritonserver --model-repository=/models --log-verbose=1
    ports:
      - "8001:8001" # Port gRPC de Triton
      - "8002:8002" # Port de métriques
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for models to load
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              # count: all
              capabilities: [gpu]
    volumes:
      - ./triton-model-repo:/models
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.1
    container_name: elasticsearch
    profiles: ["disabled"] # Désactivé par défaut, activé sur le Host VM via override
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - http.host=0.0.0.0
    ports:
      # Mappe le port sur toutes les interfaces réseau de l'hôte
      # Assurez-vous que le pare-feu de votre Host VM autorise les connexions sur le port 9200
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.1
