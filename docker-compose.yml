    build:
      context: .
      dockerfile: ./apps-microservices/DeepSeek-OCR/Dockerfile
    container_name: deepseek-ocr-vllm
    profiles: ["app"] # Profile for the main application stack
    ports:
      - "8501:8501"
    volumes:
      - /mnt/data/models:/app/models # Mount directory for model weights
      - ./apps-microservices/DeepSeek-OCR/outputs:/app/outputs # Mount directory for output files
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_PATH=/app/models/deepseek-ocr # Update with your model path
      - MAX_CONCURRENCY=8 # Réduit de 50 à 8 pour limiter la consommation RAM exponentielle
      - GPU_MEMORY_UTILIZATION=0.85 # Adjust based on your GPU memory
      - NUM_WORKERS=8 # Réduit de 24 à 8 pour limiter la pression RAM des threads de pré-traitement
    deploy:
      resources:
        limits:
          memory: 16G # Plafond dur RAM — ajuster selon la RAM disponible sur le serveur
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - services-net
    logging: *logging_defaults

