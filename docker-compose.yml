    profiles: ["app"]
    build:
      context: ./apps-microservices/api-chatbot-html-service
      dockerfile: Dockerfile
    volumes:
      - ./apps-microservices/api-chatbot-html-service:/app:rw
    ports:
      - "3550:3000"
    logging: *logging_defaults

  redis-client-frontend:
    profiles: ["app"]
    build:
      context: ./apps-microservices/redis-client-frontend
      dockerfile: Dockerfile
    ports:
      - "3551:3000"
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_SECRET=${REDIS_SECRET}
    logging: *logging_defaults

  reverse-proxy:
    image: nginx:alpine
    profiles: ["crawling"] # This was already correct
    ports:
      # The reverse proxy is the ONLY service that maps a port to the host.
      # This is the single entry point for all external traffic.
      - "8503:8503"
    volumes:
      # Mount our new nginx configuration file into the container.
      - ./apps-microservices/crawler-service/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler-service
    networks:
      - services-net
    logging: *logging_defaults

