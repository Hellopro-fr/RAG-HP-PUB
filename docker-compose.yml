version: '3.8'

services:
  api-ingestion-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/api-ingestion/Dockerfile
    container_name: api-ingestion-service-fix
    restart: unless-stopped
    env_file:
      - .env

  devis-processor-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/devis-processor-service/Dockerfile
    container_name: devis-processor-service-fix
    restart: unless-stopped
    env_file:
      - .env

  echange-processor-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/echange-processor-service/Dockerfile
    container_name: echange-processor-service-fix
    restart: unless-stopped
    env_file:
      - .env

  website-processor-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/website-processor-service/Dockerfile
    container_name: website-processor-service-fix
    restart: unless-stopped
    env_file:
      - .env

  embedding-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/embedding-service/Dockerfile
    container_name: embedding-service-fix
    restart: unless-stopped
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  di-database-qdrant-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/di-database-qdrant-service/Dockerfile
    container_name: di-database-qdrant-service-fix
    restart: unless-stopped
    env_file:
      - .env

  echange-database-qdrant-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/echange-database-qdrant-service/Dockerfile
    container_name: echange-database-qdrant-service-fix
    restart: unless-stopped
    env_file:
      - .env

  website-database-qdrant-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/website-database-qdrant-service/Dockerfile
    container_name: website-database-qdrant-service-fix
    restart: unless-stopped
    env_file:
      - .env

  webhook-service-fix:
    build:
      context: .
      dockerfile: ./apps-microservices/webhook-service/Dockerfile
    container_name: webhook-service-fix
    restart: unless-stopped
    env_file:
      - .env
