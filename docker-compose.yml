version: '3.8'

services:
  model-builder:
    build:
      context: .
      dockerfile: ./model-optimizer/Dockerfile
    volumes:
      # Monte le répertoire local pour que les modèles ONNX y soient écrits
      - ./triton-model-repo:/output
    # Exécute les deux scripts l'un après l'autre. Le conteneur s'arrêtera après.
    command: /bin/bash -c "python export_embedding_to_onnx.py && python export_reranker_to_onnx.py"
  vllm-server:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3-14B-AWQ
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --max-num-seqs 64
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --enable-prefix-caching
      --disable-log-stats
      --rope-scaling '{"rope_type":"yarn","factor":2.0,"original_max_position_embeddings":32768}'
      --swap-space 4
      --max-model-len 32768
      --enforce-eager
      --dtype auto
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for the model to load
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              # count: all
              capabilities: [gpu]
    restart: unless-stopped
    volumes:
      - /mnt/data/docker/images/huggingface_cache:/root/.cache/huggingface
    networks:
      - services-net

  triton-server:
    image: nvcr.io/nvidia/tritonserver:24.01-py3 # Utilisez une image récente
    command: tritonserver --model-repository=/models --log-verbose=1
    ports:
      - "8001:8001" # Port gRPC de Triton
      - "8002:8002" # Port de métriques
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for models to load
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              # count: all
              capabilities: [gpu]
    volumes:
      - ./triton-model-repo:/models
    networks:
      - services-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - http.host=0.0.0.0
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - services-net

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - services-net

  # --- Services Applicatifs (Clients) ---

  llm-service:
    build:
      context: .
      dockerfile: ./apps-microservices/llm-service/Dockerfile
    environment:
      - VLLM_API_URL=http://vllm-server:8000/v1/chat/completions
    depends_on:
      vllm-server:
        condition: service_healthy
    networks:
      - services-net

  embedding-model-service:
    build:
      context: .
      dockerfile: ./apps-microservices/embedding-model-service/Dockerfile
    # Le GPU n'est plus nécessaire ici, Triton s'en charge !
    environment:
      - TRITON_URL=triton-server:8001
    depends_on:
      triton-server:
        condition: service_healthy
    networks:
      - services-net

  reranking-model-service:
    build:
      context: .
      dockerfile: ./apps-microservices/reranking-model-service/Dockerfile
    # Le GPU n'est plus nécessaire ici
    environment:
      - TRITON_URL=triton-server:8001
    depends_on:
      triton-server:
        condition: service_healthy
    networks:
      - services-net

  database-recherche-service:
