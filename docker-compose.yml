      - .env
    environment:
      - DLQ_QUEUES=embedding_queue_dlq,insertion_siteweb_queue_dlq,llm_templating_queue_dlq,website_processing_queue_dlq
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  dlq-requeuer-tool:
    build:
      context: .
      dockerfile: tools/Dockerfile
    profiles: ["disabled"]
    env_file:
      - .env
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - services-net
    command: tail -f /dev/null
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    profiles: ["monitoring"] # Profile for monitoring stack
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana
    container_name: grafana
    profiles: ["monitoring"] # Profile for monitoring stack
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana  # Persist Grafana data
      - ./grafana/dashboards:/var/lib/grafana/dashboards  # Mount custom dashboards
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards  # Auto-provision dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources  # Auto-provision data sources
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - prometheus
    networks:
      - services-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawler-service:
    build:
      context: .
      dockerfile: ./apps-microservices/crawler-service/Dockerfile
    profiles: ["crawling"]
    # The 'ports' mapping has been removed to prevent conflicts.
    # We now 'expose' the port, making it accessible to other services
    # on the Docker network (like our reverse-proxy), but NOT to the host.
    expose:
      - "8503"
    volumes:
      # Mount a volume to persist crawl data outside the container
      - crawler_data:/app/storage
    env_file:
      - .env
    environment:
      # Max concurrent crawls for each individual instance.
      - MAX_CONCURRENT_CRAWLS=1
      # Fallback value if the Redis config key is missing. Set to default replica count.
      - DEFAULT_MAX_GLOBAL_CRAWLS=3
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD} # Pass the password from .env file
    depends_on:
      - redis
    deploy:
      replicas: 1 # Start with 1, can be scaled up with `docker-compose up --scale crawler-service=N`
      resources:
        limits:
          cpus: '1.0' # Limit to 1 CPU core
          memory: 4G   # Limit to 4GB of RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - ./apps-microservices/crawler-service/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    env_file:
      - .env # Load the REDIS_PASSWORD from the .env file
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --loglevel warning
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  reverse-proxy:
    image: nginx:alpine
    profiles: ["crawling"] # This was already correct
    ports:
      # The reverse proxy is the ONLY service that maps a port to the host.
      # This is the single entry point for all external traffic.
      - "8503:8503"
    volumes:
      # Mount our new nginx configuration file into the container.
      - ./apps-microservices/crawler-service/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
networks:
  services-net:
    driver: bridge
    
volumes:
  elasticsearch-data:
    driver: local
  grafana-storage:
  crawler_data:
  redis_data: