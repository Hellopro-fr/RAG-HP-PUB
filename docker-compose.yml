    volumes:
      - minio_data:/data
    command: minio server /data
    networks:
      - graph-rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

