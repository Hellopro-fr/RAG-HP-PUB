      - /mnt/data/docker/images/generation-question-caracteristiques/qc-caracterisation:/app/tracking/caracterisation:ro
      # Monte les dossiers tracking des services prix (paths VM)
      - /mnt/data/docker/images/prix-extraction/prix-extraction-produits:/app/tracking/prix-extraction-produits:ro
