services:
  model-builder:
    build:
      context: .
      dockerfile: ./model-optimizer/Dockerfile
    profiles: ["tools"] # Profile for one-off build/tooling tasks
    volumes:
      # Monte le répertoire local pour que les modèles ONNX y soient écrits
      - ./triton-model-repo:/output
    # Exécute les deux scripts l'un après l'autre. Le conteneur s'arrêtera après.
    command: /bin/bash -c "python export_embedding_to_onnx.py && python export_reranker_to_onnx.py"
    logging: &logging_defaults
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  vllm-server:
    image: vllm/vllm-openai:latest
    profiles: ["disabled"] # Profile for the main application stack
    command: >
      --model ${MODEL_NAME}
      --tensor-parallel-size 2
      --trust-remote-code
      --gpu-memory-utilization 0.95
      --max-num-seqs 32
      --max-num-batched-tokens 8192
      --enable-chunked-prefill
      --swap-space 16
      --max-model-len 32768
      --dtype bfloat16
      --load-format safetensors
      --enable-prefix-caching
      --rope-scaling '{"type":"dynamic","factor":2.0}'
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for the model to load
      start_period: 30s
    shm_size: "16g"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    restart: unless-stopped
    volumes:
      - /mnt/data/docker/images/huggingface_cache:/root/.cache/huggingface
    networks:
      - services-net
    logging: *logging_defaults

  triton-server:
    image: nvcr.io/nvidia/tritonserver:24.01-py3 # Utilisez une image récente
    profiles: ["app"] # Profile for the main application stack
    command: tritonserver --model-repository=/models --log-verbose=1
    ports:
      - "8001:8001" # Port gRPC de Triton
      - "8002:8002" # Port de métriques
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 24 # Wait up to 4 minutes for models to load
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              # count: all
              capabilities: [gpu]
    volumes:
      - ./triton-model-repo:/models
    networks:
      - services-net
    logging: *logging_defaults

  init-elasticsearch:
    image: alpine:latest
    profiles: ["disabled"]
    user: root
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - es-snapshots:/usr/share/elasticsearch/snapshots
    command: sh -c 'chown -R 1000:1000 /usr/share/elasticsearch/data /usr/share/elasticsearch/snapshots'
    logging: *logging_defaults

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.1
    container_name: elasticsearch
    profiles: ["disabled"] # Désactivé par défaut, activé sur le Host VM via override
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.audit.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - http.host=0.0.0.0
      - path.repo=/usr/share/elasticsearch/snapshots
    ports:
      # Mappe le port sur toutes les interfaces réseau de l'hôte
      # Assurez-vous que le pare-feu de votre Host VM autorise les connexions sur le port 9200
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - es-snapshots:/usr/share/elasticsearch/snapshots
    depends_on:
      init-elasticsearch:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "-u",
          "elastic:${ELASTIC_PASSWORD}",
          "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - services-net
    logging: *logging_defaults

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.1
    container_name: kibana
    profiles: ["disabled"] # Désactivé par défaut, activé sur le Host VM via override
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_URL}
      - ELASTICSEARCH_USERNAME=kibana_user
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - services-net
    logging: *logging_defaults

  # --- Services Applicatifs (Clients) ---

  image-download-service:
    build:
      context: .
      dockerfile: ./apps-microservices/image-download-service/Dockerfile
    profiles: ["app"]
    restart: unless-stopped
