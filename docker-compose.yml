      - DB_MAX_CONCURRENT_ZILLIZ_DEFAULT=2
      - REDIS_URL=redis://:${REDIS_SECRET}@${REDIS_HOST}:${REDIS_PORT}
      - MILVUS_CONCURRENCY_TIER=1
      - MILVUS_CONCURRENCY_SERVICE_NAME=database-recherche-service
