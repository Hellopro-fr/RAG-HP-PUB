          cpus: "1.0"
          memory: 2G
    # ports:
    #   - "8505:8000" # Removed to allow scaling (avoid port conflict). Access via API Gateway.
    volumes:
      - image_download_data:/app/storage
    environment:
      - APIFY_PROXY=${APIFY_PROXY}
      - REDIS_URL=redis://:${REDIS_SECRET}@${REDIS_HOST}:${REDIS_PORT}
      - RABBITMQ_URL=${RABBITMQ_URL}
