version: '3.8'

services:
  api-ingestion-service:
    build:
      context: .
      dockerfile: ./apps-microservices/api-ingestion/Dockerfile
    container_name: api-ingestion-service
    restart: unless-stopped
    ports:
      - "8509:8509"
    env_file:
      - .env

  devis-processor-service:
    build:
      context: .
      dockerfile: ./apps-microservices/devis-processor-service/Dockerfile
    container_name: devis-processor-service
    restart: unless-stopped
    env_file:
      - .env

  echange-processor-service:
    build:
      context: .
      dockerfile: ./apps-microservices/echange-processor-service/Dockerfile
    container_name: echange-processor-service
    restart: unless-stopped
    env_file:
      - .env

  website-processor-service:
    build:
      context: .
      dockerfile: ./apps-microservices/website-processor-service/Dockerfile
    container_name: website-processor-service
    restart: unless-stopped
    env_file:
      - .env

  embedding-service:
    build:
      context: .
      dockerfile: ./apps-microservices/embedding-service/Dockerfile
    container_name: embedding-service
    restart: unless-stopped
    env_file:
      - .env
    deploy:
      replicas: 4
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  di-database-qdrant-service:
    build:
      context: .
      dockerfile: ./apps-microservices/di-database-qdrant-service/Dockerfile
    container_name: di-database-qdrant-service
    restart: unless-stopped
    env_file:
      - .env

  echange-database-qdrant-service:
    build:
      context: .
      dockerfile: ./apps-microservices/echange-database-qdrant-service/Dockerfile
    container_name: echange-database-qdrant-service
    restart: unless-stopped
    env_file:
      - .env

  website-database-qdrant-service:
    build:
      context: .
      dockerfile: ./apps-microservices/website-database-qdrant-service/Dockerfile
    container_name: website-database-qdrant-service
    restart: unless-stopped
    env_file:
      - .env

  webhook-service:
    build:
      context: .
      dockerfile: ./apps-microservices/webhook-service/Dockerfile
    container_name: webhook-service
    restart: unless-stopped
    env_file:
      - .env
