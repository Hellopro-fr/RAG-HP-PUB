        limits:
          cpus: "0.5"
          memory: 128M
    ports:
      - "8580:8580"
    volumes:
      - image_download_data:/data:ro
    networks:
      - services-net
    logging: *logging_defaults

  llm-service:
    build:
      context: .
      dockerfile: ./apps-microservices/llm-service/Dockerfile
    profiles: ["app"] # Profile for the main application stack
    environment:
      - VLLM_API_URL=http://vllm-server:8000/v1/chat/completions
      - MODEL_NAME=${MODEL_NAME}
      - DEEPSEEK_MODEL_NAME=${DEEPSEEK_MODEL_NAME}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER}
    networks:
      - services-net
    env_file:
      - .env
    logging: *logging_defaults

  embedding-model-service:
    build:
      context: .
      dockerfile: ./apps-microservices/embedding-model-service/Dockerfile
    profiles: ["app"] # Profile for the main application stack
    # Le GPU n'est plus nécessaire ici, Triton s'en charge !
    # - TRITON_URL=triton-server:8001
    env_file:
      - .env
    environment:
      - TRITON_URL=${TRITON_URL}
      - EMBEDDING_BATCH_SIZE=8
      - TRITON_MAX_CONCURRENT_DEFAULT=1
      - TOTAL_MAX_CONCURRENT_REQUESTS=10
      - HIGH_PRIORITY_SERVICES=api-recherche-service,prix-traitement,mcp-api-recherche
      - MEDIUM_PRIORITY_SERVICES=api-classification-service
    # depends_on:
    #   triton-server:
    #     condition: service_healthy
    networks:
      - services-net
      - services-ext-net
      - services-global-net
    logging: *logging_defaults

  reranking-model-service:
    build:
      context: .
      dockerfile: ./apps-microservices/reranking-model-service/Dockerfile
    profiles: ["app"] # Profile for the main application stack
    # Le GPU n'est plus nécessaire ici
    environment:
      - TRITON_URL=triton-server:8001
    depends_on:
      triton-server:
        condition: service_healthy
    networks:
      - services-net
    logging: *logging_defaults

  database-recherche-service:
    build:
      context: .
      dockerfile: ./apps-microservices/database-recherche-service/Dockerfile
    profiles: ["app"] # Profile for the main application stack
    expose:
