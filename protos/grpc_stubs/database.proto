syntax = "proto3";

package database;
import "google/protobuf/struct.proto";

service DatabaseSearchService {
  // TODO: Sécuriser ce flux (authentification, validation des entrées)
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc ClassicSearch(ClassicSearchRequest) returns (SearchResponse);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  rpc HybridSearch(HybridSearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string collection_name = 1; // Nom de la collection Milvus à interroger
  repeated float query_embedding = 2;
  int32 top_k = 3;
  optional string filter_expression = 4;
  repeated string output_fields = 5;
  optional google.protobuf.Struct options = 6;
  optional string source_service = 7;
}

message ClassicSearchRequest {
  string collection_name = 1;
  string filter_expression = 2; // Le filtre "expr" de Milvus
  int32 top_k = 3;
  repeated string output_fields = 4;
  optional string source_service = 5;
}

// Requête de recherche hybride combinant recherche vectorielle dense et recherche full-text BM25
message HybridSearchRequest {
  string collection_name = 1;         // Nom de la collection Milvus
  repeated float dense_vector = 2;    // Vecteur dense (embedding) pour la recherche sémantique
  string query_text = 3;              // Texte brut pour la recherche full-text BM25
  int32 top_k = 4;                    // Nombre de résultats souhaités
  optional float dense_weight = 5;    // Poids de la recherche dense (défaut: 0.7)
  optional float sparse_weight = 6;   // Poids de la recherche sparse/BM25 (défaut: 0.3)
  optional string filter_expression = 7; // Filtre Milvus optionnel
  repeated string output_fields = 8;    // Champs de sortie optionnels
  optional google.protobuf.Struct options = 9; // Options supplémentaires (ex: context_mode)
  optional string source_service = 10;
}

message SearchResult {
  string id = 1;
  float score = 2;
  google.protobuf.Struct metadata = 3;
  string source = 4;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message GetSchemaRequest {
  string collection_name = 1;
  optional string source_service = 2;
}

message GetSchemaResponse {
  map<string, string> fields = 1;
}