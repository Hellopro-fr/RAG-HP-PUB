syntax = "proto3";

package database;
import "google/protobuf/struct.proto";

service DatabaseSearchService {
  // TODO: Sécuriser ce flux (authentification, validation des entrées)
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc ClassicSearch(ClassicSearchRequest) returns (SearchResponse);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
}

message SearchRequest {
  string collection_name = 1; // Nom de la collection Milvus à interroger
  repeated float query_embedding = 2;
  int32 top_k = 3;
  optional string filter_expression = 4;
  repeated string output_fields = 5;
  optional google.protobuf.Struct options = 6;
}

message ClassicSearchRequest {
  string collection_name = 1;
  string filter_expression = 2; // Le filtre "expr" de Milvus
  int32 top_k = 3;
  repeated string output_fields = 4;
}

message SearchResult {
  string id = 1;
  float score = 2;
  google.protobuf.Struct metadata = 3;
  string source = 4;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message GetSchemaRequest {
  string collection_name = 1;
}

message GetSchemaResponse {
  map<string, string> fields = 1;
}