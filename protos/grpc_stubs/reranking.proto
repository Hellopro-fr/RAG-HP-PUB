syntax = "proto3";

package reranking;

service RerankingService {
  // Existing RPC for backward compatibility
  rpc Rerank(RerankRequest) returns (RerankResponse);
  // New RPC that returns scores
  rpc RerankDocuments(RerankRequest) returns (RerankWithScoresResponse);
}

message RerankRequest {
  string query = 1;
  repeated string documents = 2;
}

message RerankResponse {
  repeated string ranked_documents = 1;
}

message RerankScore {
    string document = 1;
    float score = 2;
}

message RerankWithScoresResponse {
    repeated RerankScore scores = 1;
}