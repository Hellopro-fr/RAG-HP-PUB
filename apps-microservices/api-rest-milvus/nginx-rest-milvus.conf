events {
    worker_connections 1024;
}

http {
    upstream api_rest_milvus_backend {
        # Backend FastAPI pour api-rest-milvus
        server api-rest-milvus-service:8517 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        # Augmenter la limite de taille du corps de la requête pour les gros batches
        client_max_body_size 10000M;

        # Augmenter les buffers pour les grandes requêtes URI
        large_client_header_buffers 4 32k;
        client_header_buffer_size 32k;

        location / {
            proxy_pass http://api_rest_milvus_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts pour les longues requêtes
            proxy_connect_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # Buffer settings
            proxy_buffering off;

            # Augmenter les buffers pour les grandes requêtes
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://api_rest_milvus_backend/health;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
