# =============================================================================
# IMAGE CDN SERVICE - Nginx Configuration
# =============================================================================
# Sert les images produit stockées par l'image-download-service
# Volume monté: /data/images/{domain}/produit-2|3/{shard}/{shard}/{shard}/file
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # --- Types MIME ---
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # --- Logs (format minimal pour perf) ---
    log_format cdn '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" rt=$request_time';
    access_log /var/log/nginx/access.log cdn buffer=32k flush=5s;

    # --- Open file cache (accélère les accès fichier répétés) ---
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # --- Pas de gzip pour les images (déjà compressées) ---
    gzip off;

    server {
        listen 8580;
        server_name _;

        # --- Racine des fichiers (volume monté en read-only) ---
        root /data;

        # =====================================================================
        # HEALTH CHECK
        # =====================================================================
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"image-cdn-service"}';
        }

        # =====================================================================
        # IMAGES STATIQUES
        # =====================================================================
        # URL: /images/{domain}/produit-2/{s1}/{s2}/{s3}/{filename}.jpg
        # URL: /images/{domain}/produit-3/{s1}/{s2}/{s3}/{filename}.jpg
        # =====================================================================
        location /images/ {
            # Sécurité: empêcher le listing des répertoires
            autoindex off;

            # Cache navigateur: 30 jours, immutable (le contenu ne change pas)
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";

            # CORS: autoriser les domaines hellopro
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

            # Sécurité
            add_header X-Content-Type-Options "nosniff" always;

            # Types autorisés uniquement
            location ~* \.(jpg|jpeg|png|gif|webp)$ {
                try_files $uri =404;
            }

            # Bloquer tout autre type de fichier (manifest.json, etc.)
            location ~* \.(json|txt|log|sh|py|php)$ {
                return 403;
            }
        }

        # =====================================================================
        # BLOQUER TOUT LE RESTE
        # =====================================================================
        location / {
            return 404 '{"error":"not_found"}';
            default_type application/json;
        }
    }
}
