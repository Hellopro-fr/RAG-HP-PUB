# Rate-limit zones for the account-service auth surface.
# Loaded at http{} scope (default.conf loads at server{} scope cannot declare zones).
# File name "00-" prefix ensures load order before default.conf.

limit_req_zone $binary_remote_addr zone=acct_token:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=acct_authorize:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=acct_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=acct_internal:10m rate=20r/s;
