services:
  reverse-proxy:
    image: nginx:alpine
    profiles: ["crawling"]
    ports:
      - "8503:8503"
    volumes:
      # Mount nginx config from sibling directory or duplicate it? 
      # Ideally we use the one in crawler-service folder or move it.
      # For now, let's assume we point to the existing one in ../crawler-service/nginx.conf
      # to avoid duplication, OR we should copy it.
      # Let's point to the existing one for compatibility.
      - ../crawler-service/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawler-service:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["crawling"]
    expose:
      - "8503"
    volumes:
      # Mount crawl data (shared volume)
      - crawler_data:/app/storage
    env_file:
      - ../../.env
    environment:
      # MAX_CONCURRENT_CRAWLS: Limits local subprocesses per container.
      - MAX_CONCURRENT_CRAWLS=1
      # DEFAULT_MAX_GLOBAL_CRAWLS: Fallback global limit if Redis unavail/metric missing.
      - DEFAULT_MAX_GLOBAL_CRAWLS=3
      # REDIS_URL should be in .env
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crawler_data:
