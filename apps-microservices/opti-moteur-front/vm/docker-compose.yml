services:
  typesense:
    image: typesense/typesense:27.1
    container_name: typesense-200k
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data
    command: >-
      --data-dir /data
      --api-key=hp_poc_2026
      --enable-cors
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10G
