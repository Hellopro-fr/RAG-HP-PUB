events {
    worker_connections 1024;
}

http {
    # Résolution DNS dynamique toutes les 10 secondes
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream api_classification_v2_backend {
        # Docker Compose avec replicas: le service DNS résout vers tous les replicas
        # On utilise le nom du service qui pointe vers tous les replicas
        server api-classification-v2-service:8578 max_fails=1 fail_timeout=5s;

        # Load balancing round-robin par défaut
        # Keepalive pour réutiliser les connexions
        keepalive 32;
    }

    server {
        listen 80;

        # Augmenter la limite de taille du corps de la requête pour les gros batches (1000+ produits)
        client_max_body_size 10000M;

        location / {
            proxy_pass http://api_classification_v2_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts pour les longues requêtes de classification
            proxy_connect_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # Buffer settings
            proxy_buffering off;

            # HTTP 1.1 pour keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Retry automatique sur les autres replicas en cas d'erreur
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 3600s;
        }

        # Health check endpoint pour monitoring
        location /health {
            proxy_pass http://api_classification_v2_backend/health;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
