events {
    worker_connections 1024;
}

http {
    upstream api_classification_v2_backend {
        # Docker Compose crée automatiquement des entrées DNS pour les replicas
        # Le nom du service résout automatiquement vers tous les replicas
        server api-classification-v2-service:8578 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_classification_v2_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts pour les longues requêtes de classification
            proxy_connect_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # Buffer settings
            proxy_buffering off;
        }
    }
}
