# nginx.conf
server {
    listen 8099;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # === SECURITY: Block Known Scanners ===
    if ($http_user_agent ~* (censys|shodan|masscan|zgrab|nmap|nikto|atomicmail)) {
        return 403;
    }

    # === SECURITY: Blacklist Malicious IPs ===
    deny 192.159.99.95;  # Bot malveillant détecté dans les logs
    # Ajouter d'autres IPs ici si nécessaire

    # === SECURITY: Hide Sensitive Files ===
    location ~ /(sitemap\.xml|robots\.txt|\.env|\.git) {
        return 404;
    }

    # === SECURITY: Add Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy pour les requêtes API et WebSocket
    location /api {
        proxy_pass http://crawler-monitor-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Pour le routage de la Single Page Application
    location / {
        try_files $uri $uri/ /index.html;
    }
}