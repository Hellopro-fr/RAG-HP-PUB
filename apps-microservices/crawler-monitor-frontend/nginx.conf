# nginx.conf

# Map conditionnelle : ne positionne "Connection: upgrade" QUE si le header
# Upgrade est présent (requête WebSocket). Sinon, laisse vide pour les
# requêtes HTTP normales.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8099;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — re-resolve upstream on every request (10s cache)
    # Prevents 502 when backend container restarts and gets a new IP
    resolver 127.0.0.11 valid=10s;

    # === SECURITY: Block Known Scanners ===
    if ($http_user_agent ~* (censys|shodan|masscan|zgrab|nmap|nikto|atomicmail)) {
        return 403;
    }

    # === SECURITY: Blacklist Malicious IPs ===
    deny 192.159.99.95;  # Bot malveillant détecté dans les logs
    # Ajouter d'autres IPs ici si nécessaire

    # === SECURITY: Hide Sensitive Files ===
    location ~ /(sitemap\.xml|robots\.txt|\.env|\.git) {
        return 404;
    }

    # === SECURITY: Add Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === PERF: gzip compression (HUGE win for bandwidth) ===
    # Typical 70-80% reduction on JS/CSS/JSON.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2;

    # === PERF: long cache for hashed assets (immutable filenames from Vite) ===
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # index.html must NOT be cached long — it references the current hashed bundles
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Proxy pour les requêtes API et WebSocket
    # Le bloc unique /api gère à la fois les appels REST classiques et le
    # handshake WebSocket grâce au map $http_upgrade ci-dessus.
    # Note: variable in proxy_pass forces nginx to use the resolver above
    # instead of caching the IP permanently at startup.
    set $backend http://crawler-monitor-backend:3001;
    location /api {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts WebSocket : maintient la connexion ouverte
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy pour les images servies par image-cdn-service
    # Le rewrite transforme /cdn-images/<path> en /images/<path> côté upstream.
    set $cdn_images http://image-cdn-service:8580;
    location /cdn-images/ {
        rewrite ^/cdn-images/(.*)$ /images/$1 break;
        proxy_pass $cdn_images;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Pour le routage de la Single Page Application
    location / {
        try_files $uri $uri/ /index.html;
    }
}