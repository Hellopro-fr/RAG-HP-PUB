events {
    worker_connections 1024;
}

http {
    # Backend Next.js
    upstream nextjs_backend {
        server nextjs-formulaire-hp:3000;
    }

    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # =================================================================
        # Next.js app : /formulaire/*
        # =================================================================
        location /formulaire {
            proxy_pass http://nextjs_backend;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # /api/siren/ est géré par Next.js (API route dans /formulaire/api/siren/)
        # → pas besoin de location séparé, c'est matché par location /formulaire

        # Images locales : /images/* → Next.js /formulaire/images/*
        location /images/ {
            proxy_pass http://nextjs_backend/formulaire/images/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /hellopro_fr/ {
            # CORS headers
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            # Preflight OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $http_origin;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            set $hellopro_backend "https://dev-www.hellopro.fr";
            proxy_pass $hellopro_backend;
            proxy_set_header Host dev-www.hellopro.fr;
            proxy_ssl_server_name on;
        }

        # =================================================================
        # Fallback : tout le reste vers dev-www.hellopro.fr
        # =================================================================
        location / {
            set $fallback_backend "https://dev-www.hellopro.fr";
            proxy_pass $fallback_backend;
            proxy_set_header Host dev-www.hellopro.fr;
            proxy_ssl_server_name on;
        }
    }
}
