<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>QC Tracking Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --accent: #00d4ff;
            --accent-hover: #00a8cc;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --border: #27273a;
            --success: #22c55e;
            --folder: #fbbf24;
            --file: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Search */
        .search-container {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Download by date */
        .download-date-container {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
        }

        .download-date-container label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .download-date-row {
            display: flex;
            gap: 8px;
        }

        .date-input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-download-date {
            padding: 8px 14px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-download-date:hover {
            background: var(--accent-hover);
        }

        .btn-download-date:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .download-date-status {
            font-size: 0.75rem;
            margin-top: 6px;
            min-height: 1.1em;
        }

        .download-date-status.error {
            color: #f87171;
        }

        .download-date-status.success {
            color: var(--success);
        }

        /* Breadcrumb */
        .breadcrumb {
            padding: 12px 20px;
            background: var(--bg-tertiary);
            font-size: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            border-bottom: 1px solid var(--border);
        }

        .breadcrumb-item {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb-item:hover {
            color: var(--accent);
        }

        .breadcrumb-separator {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* File list */
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
        }

        .show-more-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: calc(100% - 10px);
            margin: 8px 5px;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px dashed var(--accent);
            border-radius: 8px;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .show-more-btn:hover {
            background: rgba(0, 212, 255, 0.1);
        }

        .file-item.active {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
        }

        .file-icon {
            font-size: 1.3rem;
        }

        .file-icon.folder { color: var(--folder); }
        .file-icon.file { color: var(--file); }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Main content */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .content-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .content-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        /* File viewer */
        .file-viewer {
            flex: 1;
            overflow: auto;
            padding: 20px 30px;
        }

        .file-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 200px;
            max-height: 100%;
            overflow: auto;
        }

        /* Search results */
        .search-results {
            padding: 15px 20px;
            max-height: 300px;
            overflow-y: auto;
            border-bottom: 1px solid var(--border);
            background: var(--bg-primary);
        }

        .search-result-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            background: var(--bg-secondary);
            transition: all 0.2s;
        }

        .search-result-item:hover {
            background: var(--bg-tertiary);
        }

        .search-result-name {
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .search-result-path {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .search-result-preview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: monospace;
            background: var(--bg-primary);
            padding: 8px;
            border-radius: 4px;
            max-height: 60px;
            overflow: hidden;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>📊 QC Tracking Viewer</h1>
                <p>Navigateur de fichiers tracking</p>
            </div>
            
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Rechercher dans les fichiers...">
            </div>

            <div class="download-date-container">
                <label>📦 Télécharger les trackings d'une date</label>
                <div class="download-date-row">
                    <input type="date" class="date-input" id="dateInput">
                    <button class="btn-download-date" id="downloadDateBtn" disabled>Télécharger</button>
                </div>
                <div class="download-date-status" id="downloadDateStatus"></div>
            </div>
            
            <div class="search-results" id="searchResults" style="display: none;"></div>
            
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="navigateTo('')">📁 Racine</span>
            </div>
            
            <div class="file-list" id="fileList">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="content-header">
                <div class="content-title" id="contentTitle">Sélectionnez un fichier</div>
                <div class="content-actions" id="contentActions" style="display: none;">
                    <button class="btn btn-primary" id="downloadBtn">⬇️ Télécharger</button>
                </div>
            </div>
            
            <div class="file-viewer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">📄</div>
                    <p>Sélectionnez un fichier pour voir son contenu</p>
                </div>
                <div class="file-content" id="fileContent" style="display: none;"></div>
            </div>
        </main>
    </div>

    <script>
        // Base URL for API - auto-detect based on current location
        const API_BASE = window.location.pathname.replace(/\/$/, '');
        
        let currentPath = '';
        let currentFile = null;
        let searchTimeout = null;

        // Format file size
        function formatSize(bytes) {
            if (!bytes) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return bytes.toFixed(1) + ' ' + units[i];
        }

        // Navigate to directory
        async function navigateTo(path) {
            currentPath = path;
            document.getElementById('fileList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/browse?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.detail);
                
                renderFiles(data);
                renderBreadcrumb(path);
            } catch (error) {
                document.getElementById('fileList').innerHTML = `<div class="empty-state"><p>Erreur: ${error.message}</p></div>`;
            }
        }

        // Load all files (no limit)
        async function loadAllFiles() {
            document.getElementById('fileList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const response = await fetch(`${API_BASE}/api/browse?path=${encodeURIComponent(currentPath)}&show_all=true`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.detail);

                renderFiles(data);
            } catch (error) {
                document.getElementById('fileList').innerHTML = `<div class="empty-state"><p>Erreur: ${error.message}</p></div>`;
            }
        }

        // Render file list
        function renderFiles(data) {
            const container = document.getElementById('fileList');

            if (data.items.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Dossier vide</p></div>';
                return;
            }

            // Add parent directory link
            let html = '';
            if (data.parent_path !== null) {
                html += `
                    <div class="file-item" onclick="navigateTo('${data.parent_path}')">
                        <span class="file-icon folder">⬆️</span>
                        <div class="file-info">
                            <div class="file-name">..</div>
                            <div class="file-meta">Dossier parent</div>
                        </div>
                    </div>
                `;
            }

            data.items.forEach(item => {
                const icon = item.is_directory ? '📁' : '📄';
                const iconClass = item.is_directory ? 'folder' : 'file';
                const meta = item.is_directory ? 'Dossier' : formatSize(item.size);
                const onclick = item.is_directory
                    ? `navigateTo('${item.path}')`
                    : `viewFile('${item.path}', '${item.name}')`;

                html += `
                    <div class="file-item" onclick="${onclick}" data-path="${item.path}">
                        <span class="file-icon ${iconClass}">${icon}</span>
                        <div class="file-info">
                            <div class="file-name">${item.name}</div>
                            <div class="file-meta">${meta}</div>
                        </div>
                    </div>
                `;
            });

            // "Voir plus" button if there are more files
            if (data.has_more) {
                const remaining = data.total_items - data.items.length;
                html += `
                    <button class="show-more-btn" onclick="loadAllFiles()">
                        📂 Voir plus (${remaining} fichiers restants)
                    </button>
                `;
            }

            container.innerHTML = html;
        }

        // Render breadcrumb
        function renderBreadcrumb(path) {
            const container = document.getElementById('breadcrumb');
            let html = '<span class="breadcrumb-item" onclick="navigateTo(\'\')">📁 Racine</span>';
            
            if (path) {
                const parts = path.split('/').filter(p => p);
                let currentBreadcrumb = '';
                
                parts.forEach((part, index) => {
                    currentBreadcrumb += (index > 0 ? '/' : '') + part;
                    html += `
                        <span class="breadcrumb-separator">/</span>
                        <span class="breadcrumb-item" onclick="navigateTo('${currentBreadcrumb}')">${part}</span>
                    `;
                });
            }
            
            container.innerHTML = html;
        }

        // View file content
        async function viewFile(path, name) {
            currentFile = path;
            document.getElementById('contentTitle').textContent = name;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('fileContent').style.display = 'block';
            document.getElementById('fileContent').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            document.getElementById('contentActions').style.display = 'flex';
            
            // Highlight selected file
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.file-item[data-path="${path}"]`)?.classList.add('active');
            
            try {
                const response = await fetch(`${API_BASE}/api/file?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.detail);
                
                document.getElementById('fileContent').textContent = data.content;
            } catch (error) {
                document.getElementById('fileContent').textContent = `Erreur: ${error.message}`;
            }
        }

        // Download file
        function downloadFile() {
            if (currentFile) {
                window.location.href = `${API_BASE}/api/download?path=${encodeURIComponent(currentFile)}`;
            }
        }

        // Search files
        async function searchFiles(query) {
            const resultsContainer = document.getElementById('searchResults');
            
            if (query.length < 2) {
                resultsContainer.style.display = 'none';
                return;
            }
            
            resultsContainer.style.display = 'block';
            resultsContainer.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/search?query=${encodeURIComponent(query)}`);
                const results = await response.json();
                
                if (!response.ok) throw new Error(results.detail);
                
                if (results.length === 0) {
                    resultsContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">Aucun résultat</div>';
                    return;
                }
                
                let html = '';
                results.forEach(result => {
                    const preview = result.preview ? `<div class="search-result-preview">${escapeHtml(result.preview)}</div>` : '';
                    html += `
                        <div class="search-result-item" onclick="viewFile('${result.path}', '${escapeHtml(result.name)}'); closeSearch();">
                            <div class="search-result-name">${escapeHtml(result.name)}</div>
                            <div class="search-result-path">${escapeHtml(result.path)}</div>
                            ${preview}
                        </div>
                    `;
                });
                
                resultsContainer.innerHTML = html;
            } catch (error) {
                resultsContainer.innerHTML = `<div style="padding: 20px; color: red;">Erreur: ${error.message}</div>`;
            }
        }

        function closeSearch() {
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchFiles(e.target.value), 300);
        });

        document.getElementById('downloadBtn').addEventListener('click', downloadFile);

        // Download by date
        const dateInput = document.getElementById('dateInput');
        const downloadDateBtn = document.getElementById('downloadDateBtn');
        const downloadDateStatus = document.getElementById('downloadDateStatus');

        // Set default date to today
        dateInput.value = new Date().toISOString().split('T')[0];
        downloadDateBtn.disabled = false;

        dateInput.addEventListener('change', () => {
            downloadDateBtn.disabled = !dateInput.value;
            downloadDateStatus.textContent = '';
            downloadDateStatus.className = 'download-date-status';
        });

        downloadDateBtn.addEventListener('click', async () => {
            const targetDate = dateInput.value;
            if (!targetDate) return;

            downloadDateBtn.disabled = true;
            downloadDateStatus.textContent = 'Préparation du ZIP...';
            downloadDateStatus.className = 'download-date-status';

            try {
                const response = await fetch(`${API_BASE}/api/download-by-date?target_date=${encodeURIComponent(targetDate)}`);

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Erreur serveur');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `tracking_${targetDate}.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);

                downloadDateStatus.textContent = 'Téléchargement lancé !';
                downloadDateStatus.className = 'download-date-status success';
            } catch (error) {
                downloadDateStatus.textContent = error.message;
                downloadDateStatus.className = 'download-date-status error';
            } finally {
                downloadDateBtn.disabled = false;
            }
        });

        // Initial load
        navigateTo('');
    </script>
</body>
</html>
