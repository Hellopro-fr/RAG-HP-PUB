# nginx.conf — reverse proxy pour nextjs-conseils-hp
#
# Architecture : nginx reçoit les requêtes sur le port 80 pour
# conseils-next.hellopro.eu et les transmet au server Next.js standalone
# qui tourne sur nextjs-conseils-hp:3003 (container distinct dans le même réseau Docker).
#
# Différence vs crawler-monitor-frontend : ici nginx est un REVERSE PROXY
# (le process Node.js reste actif) et non un serveur de fichiers statiques.

# WebSocket upgrade — ne positionne "Connection: upgrade" que si le header
# Upgrade est présent, sinon ferme proprement la connexion.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name conseils-next.hellopro.eu;

    # Docker embedded DNS — re-résolution à chaque requête (TTL 10s)
    # Évite un 502 si le container Next.js redémarre et change d'IP.
    resolver 127.0.0.11 valid=10s;

    # === SECURITY: Block Known Scanners ===
    if ($http_user_agent ~* (censys|shodan|masscan|zgrab|nmap|nikto|atomicmail)) {
        return 403;
    }

    # === SECURITY: Security Headers ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === PERF: gzip compression ===
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2;

    # === Next.js static bundle — noms de fichiers hachés → cache immutable 1 an ===
    # Next.js génère des assets avec hash de contenu dans /_next/static/.
    # Ces URLs ne changent jamais → le navigateur peut les mettre en cache 1 an.
    location /_next/static/ {
        set $upstream http://nextjs-conseils-hp:3003;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # === Fichiers publics (images, fonts) — cache long ===
    location /images/ {
        set $upstream http://nextjs-conseils-hp:3003;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /fonts/ {
        set $upstream http://nextjs-conseils-hp:3003;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # === Toutes les autres requêtes → proxy vers Next.js standalone ===
    # Le cache HTML n'est PAS géré ici : Next.js ISR contrôle lui-même la
    # revalidation (revalidate: 3600 dans les pages). nginx ne doit pas
    # overrider ce comportement.
    set $nextjs http://nextjs-conseils-hp:3003;
    location / {
        proxy_pass $nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts généreux pour les pages ISR à génération lente
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
