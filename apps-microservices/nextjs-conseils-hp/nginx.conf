# nginx.conf — reverse proxy pour nextjs-conseils-hp
#
# Architecture : nginx reçoit les requêtes sur le port 80 pour
# nextjs-conseils.hellopro.eu et les transmet au serveur Next.js standalone
# qui tourne sur nextjs-conseils-hp:3003 (container distinct, même réseau Docker).
#
# Ce fichier est monté comme nginx.conf RACINE du container LB
# (image nginx:alpine) :
#   ./apps-microservices/nextjs-conseils-hp/nginx.conf:/etc/nginx/nginx.conf:ro
# Il doit donc contenir les contextes main + events + http complets.

user  nginx;
worker_processes  1;            # aligné sur la limite "cpus: 0.5" du docker-compose
pid   /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile          on;
    tcp_nopush        on;
    keepalive_timeout 65;

    # Logs -> stdout/stderr (récupérés par `docker logs`)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # WebSocket upgrade — ne positionne "Connection: upgrade" que si le header
    # Upgrade est présent, sinon ferme proprement la connexion.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # === PERF: gzip ===
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf
        application/font-woff
        application/font-woff2;

    server {
        listen 80;
        server_name nextjs-conseils.hellopro.eu;

        # Docker embedded DNS — résolution dynamique (TTL 10s), évite un 502
        # si le container Next.js redémarre et change d'IP.
        #
        # ⚠️ IMPÉRATIF : pour que ce resolver s'applique réellement, proxy_pass
        # DOIT utiliser une VARIABLE ($upstream). Avec un bloc `upstream {}` ou
        # un nom en dur, nginx fige l'IP au démarrage et IGNORE le resolver.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://nextjs-conseils-hp:3003;

        # === SECURITY: blocage des scanners connus ===
        if ($http_user_agent ~* (censys|shodan|masscan|zgrab|nmap|nikto|atomicmail)) {
            return 403;
        }

        # === SECURITY: en-têtes ===
        # NB: add_header n'est PAS hérité dans une location qui définit son
        # propre add_header. Ces en-têtes s'appliquent donc à `location /`
        # (qui n'en redéfinit aucun) ; ils sont re-déclarés explicitement dans
        # la location "assets" plus bas.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-DNS-Prefetch-Control "on" always;

        # === Headers proxy communs (hoistés au niveau server) ===
        # proxy_set_header n'est hérité que si la location n'en redéfinit AUCUN.
        # Aucune des locations ci-dessous n'en redéfinit -> tout est hérité.
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # === Assets à hash de contenu Next.js -> cache immutable 1 an ===
        # _next/static, images et fonts regroupés (factorisation DRY).
        # Next.js génère des URLs avec hash de contenu -> cache navigateur 1 an.
        location ~* ^/(_next/static|images|fonts)/ {
            proxy_pass $upstream;

            # Évite un doublon de Cache-Control avec celui émis par Next.js.
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            # Re-déclaration des en-têtes sécurité (sinon perdus, cf. add_header).
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # === Toutes les autres requêtes -> Next.js standalone ===
        # Le cache HTML n'est PAS géré ici : Next.js ISR contrôle lui-même la
        # revalidation (revalidate dans les pages). nginx ne doit pas l'overrider.
        location / {
            proxy_pass $upstream;
            proxy_cache_bypass $http_upgrade;

            # Timeouts généreux pour les pages ISR à génération lente
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }
    }
}
