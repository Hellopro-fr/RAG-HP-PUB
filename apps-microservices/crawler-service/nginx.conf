events {
    worker_connections 1024;
}

http {
    # This resolver is crucial for dynamic service discovery in Docker.
    # It points to Docker's internal DNS server (127.0.0.11).
    # The cache is refreshed every 5 seconds to discover new or removed replicas.
    resolver 127.0.0.11 valid=5s;

    server {
        # Nginx will listen on port 8503 inside its container.
        listen 8503;

        # All incoming requests will be handled by this location block.
        location / {
            # By setting the backend hostname as a variable, we force Nginx
            # to use the resolver at runtime. This discovers all container IPs
            # for 'crawler-service' and enables true round-robin load balancing.
            set $backend_service "crawler-service";
            proxy_pass http://$backend_service:8503;

            # --- DYNAMIC AND RESILIENT RETRY LOGIC ---

            # Define what constitutes a "failure" that should trigger a retry on the next replica.
            # We add 'http_503' to the default 'error' and 'timeout'.
            # The 'non_idempotent' flag allows retrying POST requests, which is safe for this
            # service because the /start endpoint is idempotent (it won't create duplicate jobs).
            proxy_next_upstream error timeout http_503 non_idempotent;

            # Set a high number of tries to act as a safety ceiling. The effective limit
            # will be the timeout below, not the number of replicas.
            proxy_next_upstream_tries 50;

            # This is the key for dynamic scaling: Define a total time window for retries.
            # Nginx will try as many available replicas as it can within this 20-second window.
            # If no success is achieved, the request will fail. This works for any number of replicas.
            proxy_next_upstream_timeout 20s;

            # Set a timeout for how long Nginx will wait for a response from a single upstream server.
            proxy_read_timeout 15s;

            # --- Standard Proxy Headers ---
            # Pass essential client information to the backend service.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}