events {
    worker_connections 1024;
}

http {
    # Define the group of servers to which we will proxy requests.
    # This is our "backend".
    upstream crawler_backend {
        # The service name 'crawler-service' is used here.
        # Docker's internal DNS will automatically resolve this name
        # to the IP addresses of all running crawler-service containers.
        server crawler-service:8503;
    }

    server {
        # Nginx will listen on port 8503 inside its container.
        listen 8503;

        # All incoming requests will be handled by this location block.
        location / {
            # Forward the request to our upstream group.
            proxy_pass http://crawler_backend;

            # Set standard headers to pass client information to the backend service.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}