version: "3.8"

services:
  crawler-service:
    build: .
    ports:
      - "8503:8503"
    volumes:
      # Mount a volume to persist crawl data outside the container
      - crawler_data:/app/storage
    environment:
      # Example: Set max concurrent crawls for this instance to 2
      - MAX_CONCURRENT_CRAWLS=2
    deploy:
      replicas: 1 # Start with 1, can be scaled up with `docker-compose up --scale crawler-service=N`
      resources:
        limits:
          cpus: '1.0' # Limit to 1 CPU core
          memory: 2G   # Limit to 2GB of RAM

volumes:
  crawler_data: