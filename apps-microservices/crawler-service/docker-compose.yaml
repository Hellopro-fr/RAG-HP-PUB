services:
  reverse-proxy:
    image: nginx:alpine
    profiles: ["crawling"] # This was already correct
    ports:
      # The reverse proxy is the ONLY service that maps a port to the host.
      # This is the single entry point for all external traffic.
      - "8503:8503"
    volumes:
      # Mount our new nginx configuration file into the container.
      - ./apps-microservices/crawler-service/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - crawler-service
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawler-service:
    build:
      context: .
      dockerfile: ./apps-microservices/crawler-service/Dockerfile
    profiles: ["crawling"]
    # The 'ports' mapping has been removed to prevent conflicts.
    # We now 'expose' the port, making it accessible to other services
    # on the Docker network (like our reverse-proxy), but NOT to the host.
    expose:
      - "8503"
    volumes:
      # Mount a volume to persist crawl data outside the container
      - crawler_data:/app/storage
      # Stash flow shared dirs (mirror archive-flow mounts)
      - ./crawler_stash:/app/stash
      - ./crawler_stash_download_requests:/app/gcs-stash-requests
      - ./crawler_stash_download_results:/app/gcs-stash-downloads
    env_file:
      - .env
    environment:
      # Max concurrent crawls for each individual instance.
      - MAX_CONCURRENT_CRAWLS=1
      # Fallback value if the Redis config key is missing. Set to default replica count.
      - DEFAULT_MAX_GLOBAL_CRAWLS=3
    deploy:
      replicas: 1 # Start with 1, can be scaled up with `docker-compose up --scale crawler-service=N`
      resources:
        limits:
          cpus: '1.0' # Limit to 1 CPU core
          memory: 4G   # Limit to 4GB of RAM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  crawler_data: