events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver (updates every 5s to handle scaling)
    resolver 127.0.0.11 valid=5s;

    # Note: We removed the 'upstream' blocks to prevent Nginx from crashing 
    # if the backend services are not ready at startup.
    # Instead, we use variables in proxy_pass which forces runtime resolution.

    server {
        # Nginx will listen on port 8050 inside its container.
        listen 8050;

        # Allow large file uploads for migration endpoint (default is 1m)
        client_max_body_size 200m;

        # Long-running synchronous endpoints (stash, unstash, archive) — POST
        # retry must NOT happen at nginx layer. Each retry would hit a different
        # backend replica, which acquires a fresh lock after the previous
        # replica's lock TTL expires, causing a concurrent tar + cleanup race.
        # Incident reference: crawl 6250 on 2026-05-20.
        # Lock + heartbeat handle replica-side serialization. PHP client owns
        # the retry policy (3 attempts, 503-only).
        # nginx regex locations are matched BEFORE prefix locations, so this
        # block intercepts stash/unstash/archive before the generic /crawler/
        # location below.
        location ~ ^/crawler/(stash|unstash|archive)/ {
            set $crawler_backend "http://crawler-service:8503";
            rewrite ^/crawler/(.*) /$1 break;

            proxy_pass $crawler_backend;
            proxy_next_upstream off;
            proxy_read_timeout 14400s;       # matches LOCK_HEARTBEAT_MAX_DURATION_SECONDS
            proxy_send_timeout 14400s;
            proxy_connect_timeout 60s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 1. Crawler Service
        location /crawler/ {
            set $crawler_backend "http://crawler-service:8503";
            
            # Manually strip /crawler/ prefix because proxy_pass with variables 
            # implies original URI preservation.
            rewrite ^/crawler/(.*) /$1 break;
            
            proxy_pass $crawler_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Migration (Crawler Service)
        location /migration/ {
            set $crawler_backend "http://crawler-service:8503";
            
            rewrite ^/migration/(.*) /migration/$1 break; # Keep /migration prefix for this specific route if needed by app logic
            
            proxy_pass $crawler_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Image Comparison Service
        location /comparator/ {
            set $comparator_backend "http://image-comparison-service:8504";
            
            rewrite ^/comparator/(.*) /$1 break;
            
            proxy_pass $comparator_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root fallback
        location / {
            return 404;
        }
    }
}