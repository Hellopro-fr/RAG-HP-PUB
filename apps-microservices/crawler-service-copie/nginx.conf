events {
    worker_connections 1024;
}

http {
    # This resolver is crucial for dynamic service discovery in Docker.
    # It points to Docker's internal DNS server (127.0.0.11).
    # The cache is refreshed every 5 seconds to discover new or removed replicas.
    resolver 127.0.0.11 valid=5s;

    # Define the upstream group for our crawler services.
    upstream crawler_backend {
        # The 'server' directive points to the service name. Docker's DNS will
        # resolve this to all available replica IPs.
        #
        # max_fails=1: After 1 failed attempt (e.g., a 503 response), mark this server as down.
        # fail_timeout=10s: Once marked down, do not send any new requests to it for 10 seconds.
        # This creates a "penalty box" for busy servers, giving them time to recover.
        server crawler-service:8503 max_fails=1 fail_timeout=10s;
    }

    server {
        # Nginx will listen on port 8503 inside its container.
        listen 8503;

        # All incoming requests will be handled by this location block.
        location / {
            # Forward the request to our intelligently managed upstream group.
            proxy_pass http://crawler_backend;

            # --- Resilient Retry Logic ---
            # This directive is still essential. It tells Nginx that an http_503
            # should be considered a "failure" that counts towards max_fails.
            proxy_next_upstream error timeout http_503 non_idempotent;

            # --- Timeouts ---
            # Increased to 600s (10 minutes) to allow for large archive generation
            # or long-running operations without 504 Gateway Time-out.
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;

            # --- Standard Proxy Headers ---
            # Pass essential client information to the backend service.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}