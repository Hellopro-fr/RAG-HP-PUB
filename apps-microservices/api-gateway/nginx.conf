events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver (updates every 5s to handle scaling)
    resolver 127.0.0.11 valid=5s;

    # Upstream for the Crawler Service
    upstream crawler_backend {
        server crawler-service:8503 max_fails=1 fail_timeout=10s;
    }

    # Upstream for the Image Comparison Service
    upstream image_comparator_backend {
        server image-comparison-service:8504 max_fails=1 fail_timeout=10s;
    }

    server {
        # Nginx will listen on port 8050 inside its container.
        listen 8050;

        # Allow large file uploads for migration endpoint (default is 1m)
        client_max_body_size 200m;

        # 1. Routing for Crawler Service
        # The trailing slash in proxy_pass matches the behavior of the location block
        # turning /crawler/foo into /foo
        location /crawler/ {
            proxy_pass http://crawler_backend/;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Routing for Migration (Crawler Service)
        location /migration/ {
            proxy_pass http://crawler_backend/migration/;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Routing for Image Comparison Service
        # /comparator/foo -> /foo
        location /comparator/ {
            proxy_pass http://image_comparator_backend/;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root fallback
        location / {
            return 404;
        }
    }
}