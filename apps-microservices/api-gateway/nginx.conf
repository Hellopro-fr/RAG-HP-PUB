events {
    worker_connections 1024;
}

http {
    # Docker internal DNS resolver (updates every 5s to handle scaling)
    resolver 127.0.0.11 valid=5s;

    # Note: We removed the 'upstream' blocks to prevent Nginx from crashing 
    # if the backend services are not ready at startup.
    # Instead, we use variables in proxy_pass which forces runtime resolution.

    server {
        # Nginx will listen on port 8050 inside its container.
        listen 8050;

        # Allow large file uploads for migration endpoint (default is 1m)
        client_max_body_size 200m;

        # 1. Routing for Crawler Service
        # Removed trailing slash in proxy_pass. Nginx will forward the full path.
        # Ex: /crawler/openapi.json -> /crawler/openapi.json
        location /crawler {
            # Use a variable to force late DNS resolution
            set $crawler_backend "http://crawler-service:8503";
            
            proxy_pass $crawler_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Routing for Migration (Crawler Service)
        location /migration {
            set $crawler_backend "http://crawler-service:8503";
            
            proxy_pass $crawler_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 600s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Routing for Image Comparison Service
        location /comparator {
            set $comparator_backend "http://image-comparison-service:8504";
            
            proxy_pass $comparator_backend;
            proxy_next_upstream error timeout http_503 non_idempotent;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root fallback
        location / {
            return 404;
        }
    }
}