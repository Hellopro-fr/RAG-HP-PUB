server {
    listen 8581;
    server_name _;

    # Docker's internal DNS resolver — re-resolves hostnames on every request.
    # This prevents 502 errors when the Go backend container is recreated
    # and gets a new IP address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://mcp-gateway-service:8592;

    # Prevent search engine indexing
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /usr/share/nginx/html;
    index index.html;

    # API routes → Go backend
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth routes → Go backend
    location ~ ^/(login|logout)$ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth2 token + registration endpoints → Go backend
    # Note: /authorize is an SPA route (Vue handles the UI)
    location ~ ^/(token|register)$ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known OAuth2 metadata → Go backend
    location /.well-known/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # MCP transport routes → Go backend (with WebSocket/SSE support)
    location ~ ^/(sse|mcp|message) {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Uploaded files (icons, etc.) → Go backend
    location /uploads/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check → Go backend
    location /health {
        proxy_pass $backend;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
