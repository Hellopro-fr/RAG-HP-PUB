server {
    listen 8581;
    server_name _;

    # Allow uploads up to 10 MB (icons up to 2 MB, doc images up to 5 MB,
    # plus multipart envelope overhead). Without this, nginx's default 1 MB
    # cap rejects file uploads with HTTP 413 before they reach the Go backend.
    client_max_body_size 10m;

    # Docker's internal DNS resolver — re-resolves hostnames on every request.
    # This prevents 502 errors when the Go backend container is recreated
    # and gets a new IP address.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend http://mcp-gateway-service:8592;

    # Prevent search engine indexing
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /usr/share/nginx/html;
    index index.html;

    # API routes → Go backend
    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login: POST → Go backend (JSON API auth), GET → Vue SPA
    location = /login {
        error_page 418 = @login_api;
        if ($request_method != GET) {
            return 418;
        }
        # GET /login → Vue SPA (LoginView)
        try_files /index.html =404;
    }

    location @login_api {
        internal;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logout → Go backend
    location = /logout {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth2 token + registration endpoints → Go backend
    # Note: /authorize is an SPA route (Vue handles the UI)
    location ~ ^/(token|register)$ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known OAuth2 metadata → Go backend
    location /.well-known/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    # MCP transport routes → Go backend (with WebSocket/SSE support)
    location ~ ^/(sse|mcp|message) {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Uploaded files (icons, etc.) → Go backend
    location /uploads/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check → Go backend
    location /health {
        proxy_pass $backend;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
