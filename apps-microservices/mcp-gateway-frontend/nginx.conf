upstream go_backend {
    server mcp-gateway-service:8592;
}

server {
    listen 8581;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API routes → Go backend
    location /api/ {
        proxy_pass http://go_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth routes → Go backend
    location ~ ^/(login|logout)$ {
        proxy_pass http://go_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OAuth2 token + registration endpoints → Go backend
    # Note: /authorize is an SPA route (Vue handles the UI)
    location ~ ^/(token|register)$ {
        proxy_pass http://go_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known OAuth2 metadata → Go backend
    location /.well-known/ {
        proxy_pass http://go_backend;
        proxy_set_header Host $host;
    }

    # MCP transport routes → Go backend (with WebSocket/SSE support)
    location ~ ^/(sse|mcp|message) {
        proxy_pass http://go_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Health check → Go backend
    location /health {
        proxy_pass http://go_backend;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
