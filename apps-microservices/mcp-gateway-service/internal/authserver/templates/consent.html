<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Autoriser — MCP Gateway OAuth2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#e0effe',200:'#bae0fd',300:'#7ccbfc',400:'#36b2f8',500:'#0c96e9',600:'#0078c7',700:'#005fa1',800:'#035185',900:'#07446e'}}}}}</script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-lg rounded-xl bg-white p-8 shadow-xl">
    <div class="mb-6 text-center">
      <div class="mx-auto w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h1 class="text-xl font-bold text-gray-800">Autoriser l'accès</h1>
      <p class="mt-1 text-sm text-gray-500"><strong>{{.ClientName}}</strong> souhaite accéder aux outils MCP suivants :</p>
      <p class="mt-1 text-xs text-gray-400">Redirect : <code class="bg-gray-100 px-1 rounded">{{.RedirectURI}}</code></p>
    </div>
    <form method="post" action="/authorize" class="space-y-4">
      <input type="hidden" name="action" value="consent">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
      <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
      <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="response_type" value="code">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <div class="border border-gray-200 rounded-lg max-h-64 overflow-y-auto p-3 space-y-2">
        {{range .Servers}}
        <label class="flex items-center gap-3 px-2 py-1.5 rounded hover:bg-gray-50 cursor-pointer">
          <input type="checkbox" name="server_ids" value="{{.ID}}" {{if .Checked}}checked{{end}} class="w-4 h-4 text-brand-600 border-gray-300 rounded focus:ring-brand-500">
          <div>
            <span class="text-sm font-medium text-gray-800">{{.Name}}</span>
            <span class="text-xs text-gray-400 ml-1">{{.ToolCount}} outils</span>
          </div>
        </label>
        {{end}}
      </div>
      <div class="flex gap-3">
        <button type="submit" name="approved" value="true" class="flex-1 py-2.5 px-4 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors">Autoriser</button>
        <button type="submit" name="approved" value="false" class="flex-1 py-2.5 px-4 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">Refuser</button>
      </div>
    </form>
  </div>
</body>
</html>
