<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Connexion — MCP Gateway OAuth2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#e0effe',200:'#bae0fd',300:'#7ccbfc',400:'#36b2f8',500:'#0c96e9',600:'#0078c7',700:'#005fa1',800:'#035185',900:'#07446e'}}}}}</script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md rounded-xl bg-white p-8 shadow-xl">
    <div class="mb-6 text-center">
      <div class="mx-auto w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 class="text-xl font-bold text-gray-800">Autorisation OAuth2</h1>
      <p class="mt-1 text-sm text-gray-500">Connectez-vous pour autoriser <strong>{{.ClientName}}</strong></p>
    </div>
    {{if .Error}}<p class="text-red-500 text-sm text-center mb-4">{{.Error}}</p>{{end}}
    <form method="post" action="/authorize" class="space-y-4">
      <input type="hidden" name="action" value="login">
      <input type="hidden" name="client_id" value="{{.ClientID}}">
      <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
      <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
      <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
      <input type="hidden" name="state" value="{{.State}}">
      <input type="hidden" name="response_type" value="code">
      <div>
        <label class="block text-sm font-medium text-gray-700">Nom d'utilisateur</label>
        <input name="username" type="text" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500" value="{{.Username}}">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
        <input name="password" type="password" required class="mt-1 w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <button type="submit" class="w-full py-2.5 px-4 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors">Se connecter</button>
    </form>
  </div>
</body>
</html>
