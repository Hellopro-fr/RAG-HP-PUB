version: '3.8'

services:
  template-llm-service:
    # Nom du conteneur pour une identification facile
    container_name: template-llm-service-test
    
    # Section de construction de l'image
    build:
      # Le contexte est la racine du projet (où se trouve ce fichier)
      context: .
      # Le chemin vers le Dockerfile spécifique à votre service
      dockerfile: ./apps-microservices/template-llm-service/Dockerfile
    
    # Politique de redémarrage : 'no' est mieux pour les tests,
    # car on veut voir s'il crashe et pourquoi.
    restart: 'no'
    
    # C'est la section clé pour l'accès au GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
              
    # Fichier d'environnement : charge les variables depuis un fichier .env
    # C'est la meilleure pratique pour gérer les secrets
    #env_file:
    #  - .env